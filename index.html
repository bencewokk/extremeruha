    <script>
      const fontHref = 'https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Jost:wght@300;400;600;700&display=swap'

      function loadFonts() {
        if (document.querySelector(`link[href="${fontHref}"]`)) return
        const link = document.createElement('link')
        link.rel = 'stylesheet'
        link.href = fontHref
        document.head.appendChild(link)
      }

      // Delay non-critical ad script to reduce initial request chain depth.
      window.addEventListener('load', () => {
        if ('requestIdleCallback' in window) {
          window.requestIdleCallback(loadFonts, { timeout: 2000 })
        } else {
          setTimeout(loadFonts, 900)
        }

        const loadAds = () => {
          const script = document.createElement('script')
          script.async = true
          script.src = 'https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9354459449958991'
          script.crossOrigin = 'anonymous'
          document.head.appendChild(script)
        }

        if ('requestIdleCallback' in window) {
          window.requestIdleCallback(loadAds, { timeout: 2500 })
        } else {
          setTimeout(loadAds, 1200)
        }
      })
    </script>
